<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joke Generator - Unblocked.io</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container {
  background: #1a1a2e;
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
  max-width: 600px;
  width: 100%;
}

h1 {
  text-align: center;
  color: #fff;
  margin-bottom: 30px;
  font-size: 2em;
}

.joke-display {
  background: #0f172a;
  border: 2px solid #667eea;
  border-radius: 15px;
  padding: 30px;
  margin-bottom: 30px;
  min-height: 150px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.joke-text {
  color: #00ff88;
  font-size: 1.3em;
  line-height: 1.6;
  margin-bottom: 15px;
}

.joke-type {
  color: #667eea;
  font-size: 0.9em;
  font-weight: bold;
  margin-top: 10px;
}

.loading {
  text-align: center;
  color: #667eea;
  font-style: italic;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  margin-bottom: 20px;
}

button {
  padding: 15px;
  border: none;
  border-radius: 10px;
  background: #667eea;
  color: white;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
  font-size: 1em;
}

button:hover {
  background: #764ba2;
  transform: scale(1.05);
}

button.generate {
  background: #00ff88;
  color: #000;
  grid-column: span 2;
  font-size: 1.1em;
}

button.generate:hover {
  background: #00dd77;
}

button.copy {
  background: #2563eb;
}

button.copy:hover {
  background: #1d4ed8;
}

.filters {
  background: #0f172a;
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 20px;
}

.filter-group {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

label {
  color: #667eea;
  font-weight: bold;
  display: flex;
  align-items: center;
  gap: 8px;
}

input[type="checkbox"] {
  width: 18px;
  height: 18px;
  cursor: pointer;
}

.back-btn {
  width: 100%;
  margin-bottom: 20px;
  background: #667eea;
}

.back-btn:hover {
  background: #764ba2;
}

.error {
  color: #ef4444;
  text-align: center;
  padding: 20px;
}

@media (max-width: 600px) {
  .buttons {
    grid-template-columns: 1fr;
  }

  button.generate {
    grid-column: span 1;
  }

  .filter-group {
    flex-direction: column;
    align-items: flex-start;
  }
}
</style>
</head>

<body>

<div class="container">
  <button class="back-btn" onclick="window.location.href='index.html'">← Back to Hub</button>
  <h1>😂 Joke Generator</h1>
  
  <div class="joke-display" id="jokeDisplay">
    <div class="loading">Click "Get Joke" to load a random joke!</div>
  </div>
  
  <div class="filters">
    <div class="filter-group">
      <label>
        <input type="checkbox" id="filterGeneral" checked onchange="updateJoke()"> General
      </label>
      <label>
        <input type="checkbox" id="filterProgramming" checked onchange="updateJoke()"> Programming
      </label>
      <label>
        <input type="checkbox" id="filterKnock" checked onchange="updateJoke()"> Knock-Knock
      </label>
    </div>
  </div>
  
  <div class="buttons">
    <button class="generate" onclick="getJoke()">🎲 Get Joke</button>
    <button class="copy" onclick="copyJoke()">📋 Copy</button>
    <button class="copy" onclick="shareJoke()">📤 Share</button>
  </div>
</div>

<script>
let currentJoke = '';
let currentSetup = '';
let currentDelivery = '';

async function getJoke() {
  const display = document.getElementById('jokeDisplay');
  display.innerHTML = '<div class="loading">Loading joke...</div>';
  
  try {
    // Build filter query
    let categories = [];
    if (document.getElementById('filterGeneral').checked) categories.push('general');
    if (document.getElementById('filterProgramming').checked) categories.push('programming');
    if (document.getElementById('filterKnock').checked) categories.push('knock-knock');
    
    if (categories.length === 0) {
      categories = ['general', 'programming', 'knock-knock'];
    }
    
    const categoryQuery = categories.join(',');
    const response = await fetch(`https://v2.jokeapi.dev/joke/${categoryQuery}?type=single,twopart`);
    
    if (!response.ok) throw new Error('Failed to fetch joke');
    
    const data = await response.json();
    
    if (data.error) {
      display.innerHTML = '<div class="error">No jokes found. Try different filters!</div>';
      return;
    }
    
    let jokeHTML = '';
    let jokeText = '';
    let type = '';
    
    if (data.type === 'single') {
      currentJoke = data.joke;
      jokeText = data.joke;
      type = 'Single-part Joke';
      jokeHTML = `<div class="joke-text">${data.joke}</div>`;
    } else if (data.type === 'twopart') {
      currentSetup = data.setup;
      currentDelivery = data.delivery;
      jokeText = `${data.setup}\n\n${data.delivery}`;
      type = 'Two-part Joke';
      jokeHTML = `
        <div class="joke-text">
          <strong>Setup:</strong> ${data.setup}<br><br>
          <strong>Punchline:</strong> ${data.delivery}
        </div>
      `;
    }
    
    jokeHTML += `<div class="joke-type">📂 ${data.category.charAt(0).toUpperCase() + data.category.slice(1)} • ${type}</div>`;
    
    display.innerHTML = jokeHTML;
    currentJoke = jokeText;
    
  } catch (error) {
    display.innerHTML = `<div class="error">⚠️ Error loading joke: ${error.message}</div>`;
  }
}

function updateJoke() {
  // Auto-fetch with new filters when they change
  getJoke();
}

function copyJoke() {
  if (!currentJoke) {
    alert('Get a joke first!');
    return;
  }
  
  navigator.clipboard.writeText(currentJoke).then(() => {
    alert('✅ Joke copied to clipboard!');
  }).catch(err => {
    alert('Failed to copy');
  });
}

function shareJoke() {
  if (!currentJoke) {
    alert('Get a joke first!');
    return;
  }
  
  if (navigator.share) {
    navigator.share({
      title: '😂 Check out this joke!',
      text: currentJoke
    }).catch(err => console.log('Share failed:', err));
  } else {
    alert('Share feature not available in your browser');
  }
}

// Load a joke on page load
getJoke();
</script>

</body>
</html>
