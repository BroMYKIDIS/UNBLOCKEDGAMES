<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Clock - World Time Zones</title>

<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container {
  background: rgba(0, 0, 0, 0.8);
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
  max-width: 1000px;
  width: 100%;
}

h1 {
  text-align: center;
  color: #fff;
  margin-top: 0;
  margin-bottom: 30px;
  font-size: 2.5em;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
}

.clocks-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.clock-card {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  border-radius: 15px;
  padding: 20px;
  text-align: center;
  border: 2px solid #667eea;
  transition: transform 0.3s, box-shadow 0.3s;
  box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
}

.clock-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
}

.timezone-name {
  color: #667eea;
  font-size: 1.2em;
  font-weight: bold;
  margin-bottom: 10px;
}

.time-display {
  font-size: 2.5em;
  color: #00ff88;
  font-weight: bold;
  font-family: 'Courier New', monospace;
  margin: 10px 0;
  text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
}

.date-display {
  color: #94a3b8;
  font-size: 0.9em;
  margin-top: 10px;
}

.controls {
  text-align: center;
  margin-bottom: 20px;
}

.add-timezone {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 20px;
}

select {
  padding: 10px;
  border-radius: 8px;
  border: 2px solid #667eea;
  background: #1a1a2e;
  color: #fff;
  font-size: 1em;
  cursor: pointer;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #667eea;
  color: white;
  font-size: 1em;
  cursor: pointer;
  transition: background 0.3s;
  font-weight: bold;
}

button:hover {
  background: #764ba2;
}

.remove-btn {
  background: #ef4444;
  padding: 5px 10px;
  font-size: 0.8em;
  margin-top: 10px;
}

.remove-btn:hover {
  background: #dc2626;
}

.preset-buttons {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 20px 0;
}

.preset-btn {
  padding: 8px 15px;
  font-size: 0.9em;
  background: #764ba2;
}

.preset-btn:hover {
  background: #667eea;
}

@media (max-width: 768px) {
  .container {
    padding: 20px;
  }

  h1 {
    font-size: 1.8em;
    margin-bottom: 20px;
  }

  .time-display {
    font-size: 1.8em;
  }

  .clocks-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>🕐 World Digital Clock</h1>

  <div class="controls">
    <div class="preset-buttons">
      <button class="preset-btn" onclick="addPreset('UTC')">UTC</button>
      <button class="preset-btn" onclick="addPreset('America/New_York')">New York</button>
      <button class="preset-btn" onclick="addPreset('Europe/London')">London</button>
      <button class="preset-btn" onclick="addPreset('Europe/Paris')">Paris</button>
      <button class="preset-btn" onclick="addPreset('Asia/Tokyo')">Tokyo</button>
      <button class="preset-btn" onclick="addPreset('Asia/Dubai')">Dubai</button>
      <button class="preset-btn" onclick="addPreset('Australia/Sydney')">Sydney</button>
    </div>

    <div class="add-timezone">
      <select id="timezoneSelect">
        <option value="">Select a timezone...</option>
      </select>
      <button onclick="addCustomTimezone()">Add Timezone</button>
    </div>
  </div>

  <div class="clocks-grid" id="clocksGrid"></div>
</div>

<script>
const timezones = [
  // Presets
  { name: 'UTC', zone: 'UTC' },
  { name: 'New York', zone: 'America/New_York' },
  { name: 'Los Angeles', zone: 'America/Los_Angeles' },
  { name: 'Chicago', zone: 'America/Chicago' },
  { name: 'Denver', zone: 'America/Denver' },
  { name: 'Toronto', zone: 'America/Toronto' },
  { name: 'Mexico City', zone: 'America/Mexico_City' },
  { name: 'São Paulo', zone: 'America/Sao_Paulo' },
  { name: 'Buenos Aires', zone: 'America/Argentina/Buenos_Aires' },
  { name: 'London', zone: 'Europe/London' },
  { name: 'Paris', zone: 'Europe/Paris' },
  { name: 'Berlin', zone: 'Europe/Berlin' },
  { name: 'Moscow', zone: 'Europe/Moscow' },
  { name: 'Dubai', zone: 'Asia/Dubai' },
  { name: 'India', zone: 'Asia/Kolkata' },
  { name: 'Bangkok', zone: 'Asia/Bangkok' },
  { name: 'Hong Kong', zone: 'Asia/Hong_Kong' },
  { name: 'Singapore', zone: 'Asia/Singapore' },
  { name: 'Tokyo', zone: 'Asia/Tokyo' },
  { name: 'Seoul', zone: 'Asia/Seoul' },
  { name: 'Sydney', zone: 'Australia/Sydney' },
  { name: 'Auckland', zone: 'Pacific/Auckland' },
  { name: 'Honolulu', zone: 'Pacific/Honolulu' },
];

let activeTimezones = ['UTC', 'America/New_York', 'Europe/London', 'Asia/Tokyo'];

function populateTimezoneSelect() {
  const select = document.getElementById('timezoneSelect');
  timezones.forEach(tz => {
    const option = document.createElement('option');
    option.value = tz.zone;
    option.textContent = tz.name + ' (' + tz.zone + ')';
    select.appendChild(option);
  });
}

function getTimeInTimezone(zone) {
  const now = new Date();
  const formatter = new Intl.DateTimeFormat('en-US', {
    timeZone: zone,
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: false,
  });
  return formatter.format(now);
}

function getDateInTimezone(zone) {
  const now = new Date();
  const formatter = new Intl.DateTimeFormat('en-US', {
    timeZone: zone,
    year: 'numeric',
    month: 'long',
    day: 'numeric',
    weekday: 'short',
  });
  return formatter.format(now);
}

function getTimezoneName(zone) {
  const tz = timezones.find(t => t.zone === zone);
  return tz ? tz.name : zone;
}

function updateClocks() {
  const grid = document.getElementById('clocksGrid');
  grid.innerHTML = '';

  activeTimezones.forEach(zone => {
    const time = getTimeInTimezone(zone);
    const date = getDateInTimezone(zone);
    const name = getTimezoneName(zone);

    const card = document.createElement('div');
    card.className = 'clock-card';
    card.innerHTML = `
      <div class="timezone-name">${name}</div>
      <div class="time-display">${time}</div>
      <div class="date-display">${date}</div>
      <button class="remove-btn" onclick="removeTimezone('${zone}')">Remove</button>
    `;
    grid.appendChild(card);
  });
}

function addPreset(zone) {
  if (!activeTimezones.includes(zone)) {
    activeTimezones.push(zone);
    updateClocks();
  }
}

function addCustomTimezone() {
  const select = document.getElementById('timezoneSelect');
  const zone = select.value;

  if (zone && !activeTimezones.includes(zone)) {
    activeTimezones.push(zone);
    select.value = '';
    updateClocks();
  } else if (activeTimezones.includes(zone)) {
    alert('This timezone is already added!');
  } else {
    alert('Please select a timezone');
  }
}

function removeTimezone(zone) {
  activeTimezones = activeTimezones.filter(z => z !== zone);
  updateClocks();
}

// Initial setup
populateTimezoneSelect();
updateClocks();

// Update every second
setInterval(updateClocks, 1000);
</script>

</body>
</html>
